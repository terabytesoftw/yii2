on:
  - pull_request
  - push

name: ci-mssql-2017-windows

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: PHP ${{ matrix.php }}-mssql-2017
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        php:
        - 7.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SQL Server 2017
        run: |
          choco install sql-server-2017 --params="'/InstanceName:MSSQLSERVER /SQLSYSADMINACCOUNTS:Administrator /SAPWD:YourStrong!Passw0rd /TCPENABLED:1 /IACCEPTSQLSERVERLICENSETERMS'" --no-progress
          Start-Sleep -Seconds 30

      - name: Install sqlcmd
        run: choco install mssql-tools --no-progress

      - name: Create MS SQL Database
        run: |
          sqlcmd -S localhost -U SA -P 'YourStrong!Passw0rd' -Q "CREATE DATABASE yiitest"

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@v2
        with:
          coverage: xdebug
          extensions: pdo, pdo_sqlsrv
          ini-values: date.timezone='UTC'
          php-version: ${{ matrix.php }}
          tools: composer:v2, pecl

      - name: Update composer
        run: composer self-update

      - name: Install dependencies with composer
        run: composer update --prefer-dist --no-interaction --no-progress --optimize-autoloader --ansi

      - name: Run MSSQL tests with PHPUnit and generate coverage.
        run: vendor/bin/phpunit --group mssql --coverage-clover=coverage.xml --colors=always

      - name: Upload coverage to Codecov.
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
